{% load erieiron_common_tags %}

<div class="tab-pane-content">
    <form method="post" action="{% url 'action_business_regenerate_architecture' business.id %}"
          class="me-3 d-flex justify-content-end">
        {% csrf_token %}
        <button type="submit"
                class="btn btn-sm bi bi-arrow-counterclockwise"
                onclick="return confirm('Are you sure you want to regenerate the Architecture?')">
            Regenerate Architecture
        </button>
    </form>

    <div class="markdown-container">
        {{ business.architecture|default:""|markdown }}
    </div>
</div>
