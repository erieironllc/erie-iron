{% load erieiron_common_tags %}

<div class="tab-pane-content">
    {% if not business.architecture %}
        <div class="d-flex justify-content-end gap-2 mb-3">
            <button type="button"
                    class="btn btn-sm btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#defineArchitectureModal">
                Define Architecture
            </button>
        </div>

        <div class="alert alert-info" role="alert">
            No architecture has been defined yet. Use the Define Architecture button to provide a description.
        </div>
    {% else %}
        <div class="markdown-container pre">{{ business.architecture}}</div>
    {% endif %}
</div>

<div class="modal fade" id="defineArchitectureModal" tabindex="-1" aria-labelledby="defineArchitectureModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form method="post" action="{% url 'action_business_define_architecture' business.id %}">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="defineArchitectureModalLabel">Define Architecture</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="architectureDefinition" class="form-label">Architecture Details</label>
                        <textarea id="architectureDefinition"
                                  name="architecture_definition"
                                  class="form-control"
                                  rows="12"
                                  placeholder="Describe the system architecture, key services, and integrations."
                                  required></textarea>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-end gap-3">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>
