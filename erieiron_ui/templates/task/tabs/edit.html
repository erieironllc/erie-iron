{% load erieiron_common_tags %}

<div class="tab-pane-content">
    <div class="row mb-3">
        <div class="col-md-12">
                <label class="form-label">Sandbox dir</label>
                <div class="d-flex justify-content-between">
                    <input id="txt_sandbox_path" type="text" class="form-control " value="{{ sandbox_path }}" disabled>
                    {% include "_copy_clipboard_btn.html" with target_el="#txt_sandbox_path" %}
                    {% include "_copy_clipboard_btn.html" with target_el="#div_iteration_debug_link" icon="bi-folder-symlink" %}
                </div>
        </div>
    </div>

    <hr>

    <div class="mb-3 d-flex justify-content-between align-items-center">
        <div>
            <button type="submit" class="btn btn-primary" form="task-edit-form">Save Changes</button>
        </div>
        <div class="d-flex gap-2">
            <form method="post" action="{% url 'action_restart_task' task.id %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-warning"
                        onclick="return confirm('Are you sure you want to restart this task?')">
                    Restart
                </button>
            </form>
            <form method="post" action="{% url 'action_delete_task' task.id %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger"
                        onclick="return confirm('Are you sure you want to delete this task? This action cannot be undone.')">
                    Delete
                </button>
            </form>
        </div>
    </div>
    
    <hr>

    <form id="task-edit-form" action="{% url 'action_update_task' task.id %}" method="post">
        {% csrf_token %}
        <div class="row">
            
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select name="status" id="status" class="form-select">
                        {% for value, label in task_status_choices %}
                            <option value="{{ value }}"
                                    {% if task.status == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="role_assignee" class="form-label">Role Assignee</label>
                    <select name="role_assignee" id="role_assignee" class="form-select">
                        {% for value, label in task_role_choices %}
                            <option value="{{ value }}"
                                    {% if task.role_assignee == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="phase" class="form-label">Phase</label>
                    <select name="phase" id="phase" class="form-select">
                        {% for value, label in task_phase_choices %}
                            <option value="{{ value }}"
                                    {% if task.phase == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="task_type" class="form-label">Task Type</label>
                    <select name="task_type" id="task_type" class="form-select">
                        {% for value, label in task_type_choices %}
                            <option value="{{ value }}"
                                    {% if task.task_type == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="implementation_phase" class="form-label">UI First Phase</label>
                    <select name="implementation_phase" id="implementation_phase" class="form-select">
                        <option value="">-- None --</option>
                        {% for value, label in task_implementation_phase_choices %}
                            <option value="{{ value }}"
                                    {% if task.implementation_phase == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="execution_schedule" class="form-label">Execution Schedule</label>
                    <select name="execution_schedule" id="execution_schedule" class="form-select">
                        {% for value, label in task_execution_schedule_choices %}
                            <option value="{{ value }}"
                                    {% if task.execution_schedule == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="timeout_seconds" class="form-label">Timeout (seconds)</label>
                    <input type="number" name="timeout_seconds" id="timeout_seconds" class="form-control"
                           value="{% if task.timeout_seconds %}{{ task.timeout_seconds }}{% endif %}">
                </div>

                <div class="mb-3">
                    <label for="max_budget_usd" class="form-label">Max Budget (USD)</label>
                    <input type="number" step="0.01" name="max_budget_usd" id="max_budget_usd" class="form-control"
                           value="{% if task.max_budget_usd %}{{ task.max_budget_usd }}{% endif %}">
                </div>


                <div class="mb-3">
                    <label for="execution_start_time" class="form-label">Execution Start Time</label>
                    <input type="datetime-local" name="execution_start_time" id="execution_start_time"
                           class="form-control"
                           value="
                                   {% if task.execution_start_time %}{{ task.execution_start_time|date:'Y-m-d\TH:i' }}{% endif %}">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" name="requires_test" id="requires_test" class="form-check-input"
                           {% if task.requires_test %}checked{% endif %}>
                    <label for="requires_test" class="form-check-label">Requires Test</label>
                </div>

            </div>

            <div class="col-md-6">
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea name="description" id="description" class="form-control"
                              rows="6">{{ task.description }}</textarea>
                </div>

                <div class="mb-3">
                    <label for="completion_criteria" class="form-label">Completion Criteria</label>
                    <textarea name="completion_criteria" id="completion_criteria" class="form-control"
                              rows="6">{{ task.completion_criteria|json_dumps }}</textarea>
                    <small class="text-muted">Enter JSON array of criteria.</small>
                </div>

                <div class="mb-3">
                    <label for="risk_notes" class="form-label">Risk Notes</label>
                    <textarea name="risk_notes" id="risk_notes" class="form-control"
                              rows="6">{{ task.risk_notes }}</textarea>
                </div>

            </div>
        </div>

    </form>
</div>
