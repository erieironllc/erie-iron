{% extends "_base_templates/_base_template.html" %}
{% load static %}

{% block content %}
<style>
    .login-viewport {
        min-height: 100vh;
        background: radial-gradient(circle at top left, rgba(59,130,246,0.45), transparent 45%),
                    radial-gradient(circle at bottom right, rgba(6,182,212,0.35), transparent 40%),
                    linear-gradient(135deg, #1E1E2E 0%, #111827 100%);
        padding: 4rem 1rem;
    }
    .login-card {
        max-width: 420px;
        width: 100%;
        background: rgba(30, 30, 46, 0.94);
        border-radius: 1.5rem;
        border: 1px solid rgba(96, 165, 250, 0.4);
        backdrop-filter: blur(12px);
    }
    .login-logo {
        width: 72px;
        height: 72px;
    }
    .login-input {
        background-color: rgba(17, 24, 39, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.25);
        color: #EAEAEA;
    }
    .login-input:focus {
        box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        border-color: rgba(59, 130, 246, 0.6);
    }
    .login-btn {
        background: linear-gradient(135deg, #3B82F6 0%, #06B6D4 100%);
        border: none;
        color: #fdfaf6;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .login-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.35);
    }
    .login-card small {
        color: #9CA3AF;
    }
</style>

<div class="login-viewport d-flex align-items-center justify-content-center">
    <div class="login-card p-4 p-md-5 shadow-lg">
        <div class="text-center mb-4">
            <img src="{% static 'img/logo_no_text_reversed.png' %}" alt="ErieIron" class="login-logo mb-3">
            <h1 class="fs-3 text-light fw-bold mb-2">Welcome to the <br>Erie Iron Ops Console</h1>
            <p class="mb-0">Sign in to orchestrate initiatives, monitor agents, and keep the iron hot.</p>
        </div>

        <div class="text-center">
            <a href="{{ cognito_login_url }}" class="btn login-btn btn-lg w-100 py-3 fw-semibold">
                Sign In
            </a>
            <p class="text-muted small mt-3">You'll be able to sign in with your Google account.</p>
        </div>
    </div>
</div>
{% endblock %}
