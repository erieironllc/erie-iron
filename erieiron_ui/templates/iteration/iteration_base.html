{% extends "_base_templates/_base_template.html" %}
{% load humanize %}
{% load erieiron_common_tags %}

{% block content %}
    <div class="row">
        <div class="col-sidebar">
            {% include "_base_templates/_sidebar.html" with sidebar_title="Iteration" %}
        </div>
        <div class="col-main-content">
            {% include tab_template %}
        </div>
    </div>
    {% if self_driving_task %}
        <div class="d-none"
             data-phase-watch-task-id="{{ task.id }}"
             data-phase-watch-url="{% url 'view_task_phase_state' task.id %}"
             data-phase-watch-seq="{{ self_driving_task.phase_change_seq|default_if_none:0 }}">
        </div>
    {% endif %}
    <script>
        $(document).ready(function () {
            if (!window.iteration_view) {
                window.iteration_view = new IterationView();
            } else {
                window.iteration_view.initialize();
            }
        });
    </script>
{% endblock %}
