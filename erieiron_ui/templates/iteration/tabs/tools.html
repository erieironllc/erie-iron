<form method="post" action="{% url 'action_delete_iteration' iteration.id %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"
            onclick="return confirm('Are you sure you want to delete this iteration? This action cannot be undone.')">
        Delete Iteration
    </button>
</form>

<form method="post" action="{% url 'action_rollback_iteration' iteration.id %}" class="mt-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-warning"
            onclick="return confirm('Are you sure you want to rollback to this iteration? This will delete newer iterations and restore the codebase to this point.')">
        Rollback to this iteration
    </button>
</form>
