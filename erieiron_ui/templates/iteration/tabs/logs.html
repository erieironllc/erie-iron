<div class="d-flex justify-content-end">
    {% include "_copy_clipboard_btn.html" with target_el="#div_logs" %}
</div>
<div class="pre" id="div_logs"
     data-iteration-id="{{ iteration.id }}"
     data-logs-url="{% url 'view_iteration_logs' iteration.id %}">
    {{ iteration.get_all_log_content|default_if_none:"" }}
</div>
<script>
    (function () {
        const logsEl = $('#div_logs');
        if (!logsEl.length) {
            return;
        }

        const node = logsEl[0];
        if (node) {
            node.scrollTop = node.scrollHeight;
        }

        if (window.iteration_view && typeof window.iteration_view.setupLogPolling === 'function') {
            window.iteration_view.setupLogPolling();
        }
    })();
</script>
