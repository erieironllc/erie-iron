{% load erieiron_common_tags %}
{% load static %}

    <title>{{ page_title|default_if_none:"Erie Iron, LLC" }}</title>
    {% block extrahead %}{% endblock %}

    <style>
        {{ pygments_css}}

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.0/themes/base/jquery-ui.css">
    <link rel="icon" type="image/png" href="{% static 'img/favicon/favicon-32x32.png' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="{% timestamp_static 'style.css' %}" rel="stylesheet">
    <script src="{% timestamp_static 'erieiron_app.min.js' %}"></script>
