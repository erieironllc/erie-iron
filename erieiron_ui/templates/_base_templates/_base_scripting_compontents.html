{% load static %}

<script>
    const error_tokens = {{ allowed_back_dests|default:"[]"|safe }};
    {#    intentionally obfuscating the var name#}

    function resetScrollableContainers() {
        try {
            var scrollableSelectors = [
                'body',
                'html',
                '.col-main-content',
                '.col-sidebar',
                '.tab-pane',
                '.list-group',
                '.scrollable'
            ];
            scrollableSelectors.forEach(function (selector) {
                document.querySelectorAll(selector).forEach(function (el) {
                    if (!el) {
                        return;
                    }
                    if (typeof el.scrollTo === 'function') {
                        el.scrollTo({top: 0, behavior: 'auto'});
                    } else if (typeof el.scrollTop === 'number') {
                        el.scrollTop = 0;
                    }
                });
            });
            window.scrollTo({top: 0, behavior: 'auto'});
        } catch (err) {
            console.warn('Failed to reset scroll positions', err);
        }
    }

    var breadcrumbResizeHandle = null;

    function scheduleBreadcrumbAdjustment() {
        try {
            if (breadcrumbResizeHandle) {
                cancelAnimationFrame(breadcrumbResizeHandle);
            }
            breadcrumbResizeHandle = requestAnimationFrame(function () {
                breadcrumbResizeHandle = null;
                adjustBreadcrumbWidths();
            });
        } catch (err) {
            console.warn('Failed to schedule breadcrumb adjustment', err);
        }
    }

    function measureBreadcrumbState(breadcrumbItems, breadcrumbGap) {
        var widths = breadcrumbItems.map(function (item) {
            return item.getBoundingClientRect().width;
        });
        var gapCount = Math.max(0, breadcrumbItems.length - 1);
        var totalGap = gapCount * breadcrumbGap;
        return {
            widths: widths,
            total: widths.reduce(function (sum, value) { return sum + value; }, 0) + totalGap,
            gapCount: gapCount
        };
    }

    function adjustBreadcrumbWidths() {
        try {
            var nav = document.getElementById('top_nav');
            if (!nav) {
                return;
            }

            var leftPart = document.getElementById('top_nav_leftpart');
            var rightPart = document.getElementById('top_nav_rightpart');
            var breadcrumbList = leftPart ? leftPart.querySelector('.breadcrumb') : null;

            if (!breadcrumbList) {
                return;
            }

            var breadcrumbItems = Array.prototype.filter.call(
                breadcrumbList.querySelectorAll('.breadcrumb-item'),
                function (item) {
                    return item && item.offsetParent !== null;
                }
            );

            if (!breadcrumbItems.length) {
                return;
            }

            breadcrumbItems.forEach(function (item) {
                item.style.removeProperty('--breadcrumb-max-width');
            });

            var navStyles = window.getComputedStyle(nav);
            var navWidth = nav.clientWidth;
            var navPadding = parseFloat(navStyles.paddingLeft) + parseFloat(navStyles.paddingRight);

            var rightWidth = rightPart ? rightPart.getBoundingClientRect().width : 0;
            var leftAvailable = navWidth - navPadding - rightWidth;
            if (!leftPart) {
                leftAvailable = navWidth - navPadding;
            }

            if (leftAvailable <= 0) {
                return;
            }

            var logo = leftPart ? leftPart.querySelector('.logo') : null;
            var logoWidth = logo ? logo.getBoundingClientRect().width : 0;

            var leftStyles = leftPart ? window.getComputedStyle(leftPart) : null;
            var leftGap = leftStyles ? parseFloat(leftStyles.columnGap || leftStyles.gap || 0) : 0;

            var breadcrumbStyles = window.getComputedStyle(breadcrumbList);
            var breadcrumbPadding = parseFloat(breadcrumbStyles.paddingLeft) + parseFloat(breadcrumbStyles.paddingRight);
            var breadcrumbGap = parseFloat(breadcrumbStyles.columnGap || breadcrumbStyles.gap || 0) || 0;

            var availableWidth = leftAvailable - logoWidth - leftGap - breadcrumbPadding;
            if (availableWidth <= 0) {
                return;
            }

            var measurement = measureBreadcrumbState(breadcrumbItems, breadcrumbGap);
            if (measurement.total <= availableWidth + 1) {
                return;
            }

            var totalGapSpace = measurement.gapCount * breadcrumbGap;
            var effectiveAvailable = Math.max(0, availableWidth - totalGapSpace);
            var baseMinWidth = 48;
            var minWidth = baseMinWidth;

            if (breadcrumbItems.length > 0 && effectiveAvailable > 0) {
                var averageWidth = effectiveAvailable / breadcrumbItems.length;
                if (averageWidth < baseMinWidth) {
                    minWidth = Math.max(32, Math.floor(averageWidth));
                }
            }

            var itemsInfo = breadcrumbItems.map(function (item, index) {
                return {
                    index: index,
                    item: item,
                    initialWidth: measurement.widths[index]
                };
            });

            var sorted = itemsInfo.slice().sort(function (a, b) {
                return b.initialWidth - a.initialWidth;
            });

            var targetWidths = measurement.widths.slice();
            var overflow = measurement.total - availableWidth;
            var position = 0;

            while (overflow > 0 && position < sorted.length) {
                var currentWidth = sorted[position].initialWidth;
                var groupEnd = position + 1;
                while (groupEnd < sorted.length && Math.abs(sorted[groupEnd].initialWidth - currentWidth) < 1) {
                    groupEnd += 1;
                }

                var groupCount = groupEnd - position;
                var nextWidth = groupEnd < sorted.length ? sorted[groupEnd].initialWidth : minWidth;
                nextWidth = Math.max(nextWidth, minWidth);

                var maxShrinkForGroup = Math.max(0, (currentWidth - nextWidth) * groupCount);

                if (maxShrinkForGroup <= 0) {
                    position = groupEnd;
                    continue;
                }

                if (overflow <= maxShrinkForGroup) {
                    var shrinkEach = overflow / groupCount;
                    for (var idx = position; idx < groupEnd; idx++) {
                        var targetIndex = sorted[idx].index;
                        targetWidths[targetIndex] = Math.max(minWidth, targetWidths[targetIndex] - shrinkEach);
                    }
                    overflow = 0;
                    break;
                } else {
                    for (var idx2 = position; idx2 < groupEnd; idx2++) {
                        var targetIndex2 = sorted[idx2].index;
                        targetWidths[targetIndex2] = Math.max(minWidth, nextWidth);
                    }
                    overflow -= maxShrinkForGroup;
                    position = groupEnd;
                }
            }

            if (overflow > 0) {
                var fallbackShrink = overflow / sorted.length;
                for (var s = 0; s < sorted.length; s++) {
                    var targetIndex3 = sorted[s].index;
                    targetWidths[targetIndex3] = Math.max(minWidth, targetWidths[targetIndex3] - fallbackShrink);
                }
            }

            targetWidths.forEach(function (targetWidth, index) {
                var listItem = breadcrumbItems[index];
                listItem.style.setProperty('--breadcrumb-max-width', targetWidth + 'px');

                var anchor = listItem.querySelector('a, span, button');
                if (anchor) {
                    var fullLabel = anchor.dataset.fullLabel || anchor.textContent.trim();
                    anchor.dataset.fullLabel = fullLabel;
                    if (!anchor.getAttribute('title')) {
                        anchor.setAttribute('title', fullLabel);
                    }
                }
            });

            var adjustedMeasurement = measureBreadcrumbState(breadcrumbItems, breadcrumbGap);
            var residual = adjustedMeasurement.total - availableWidth;
            var safeguard = 0;

            while (residual > 1 && safeguard < 20) {
                safeguard += 1;
                var maxCurrentWidth = Math.max.apply(null, adjustedMeasurement.widths);
                var widestIndexes = [];

                adjustedMeasurement.widths.forEach(function (widthValue, index) {
                    if (maxCurrentWidth - widthValue <= 1) {
                        widestIndexes.push(index);
                    }
                });

                if (!widestIndexes.length) {
                    break;
                }

                widestIndexes.forEach(function (index) {
                    var listItem = breadcrumbItems[index];
                    var currentMax = parseFloat(listItem.style.getPropertyValue('--breadcrumb-max-width')) || listItem.getBoundingClientRect().width;
                    var nextWidth = Math.max(minWidth, currentMax - 1);
                    listItem.style.setProperty('--breadcrumb-max-width', nextWidth + 'px');
                });

                adjustedMeasurement = measureBreadcrumbState(breadcrumbItems, breadcrumbGap);
                residual = adjustedMeasurement.total - availableWidth;
            }
        } catch (err) {
            console.warn('Failed to adjust breadcrumb widths', err);
        }
    }

    function activateSidebarFromHash(hash) {
        if (!hash || hash.length <= 1) {
            return;
        }

        try {
            var triggerEl = document.querySelector(hash);
            if (triggerEl && triggerEl.matches('[data-bs-toggle="list"], [data-bs-toggle="tab"]')) {
                // hash is the ID of the trigger element itself
            } else {
                triggerEl = document.querySelector('[data-bs-toggle="list"][href="' + hash + '"]') ||
                    document.querySelector('[data-bs-toggle="tab"][href="' + hash + '"]');
            }

            if (!triggerEl) {
                return;
            }

            var tabInstance = bootstrap.Tab.getInstance(triggerEl);
            if (!tabInstance) {
                tabInstance = new bootstrap.Tab(triggerEl);
            }
            tabInstance.show();

            var targetId = triggerEl.getAttribute('href') || hash;
            if (targetId) {
                var targetPane = document.querySelector(targetId);
                if (targetPane) {
                    targetPane.scrollIntoView({behavior: 'smooth', block: 'start'});
                }
            }

            resetScrollableContainers();
        } catch (err) {
            console.warn('Failed to activate sidebar item from hash', err);
        }
    }

    $(document).ready(function () {
        erie_common_init();
        activateSidebarFromHash(window.location.hash);

        scheduleBreadcrumbAdjustment();

        $(window).on('hashchange', function () {
            activateSidebarFromHash(window.location.hash);
        });

        $(window).on('resize', function () {
            scheduleBreadcrumbAdjustment();
        });

        $(document).on('shown.bs.tab', '[data-bs-toggle="list"],[data-bs-toggle="tab"]', function (event) {
            try {
                var tabId = event.target.id;
                if (tabId) {
                    if (window.location.hash !== '#' + tabId) {
                        history.replaceState(null, '', '#' + tabId);
                    }
                } else {
                    var href = event.target.getAttribute('href');
                    if (href && window.location.hash !== href) {
                        history.replaceState(null, '', href);
                    }
                }

                resetScrollableContainers();
            } catch (err) {
                console.warn('Failed to update hash for tab change', err);
            }
        });

        try {
            var nav = document.getElementById('top_nav');
            var leftPart = document.getElementById('top_nav_leftpart');
            var rightPart = document.getElementById('top_nav_rightpart');

            if (typeof ResizeObserver !== 'undefined') {
                var observer = new ResizeObserver(function () {
                    scheduleBreadcrumbAdjustment();
                });
                if (nav) {
                    observer.observe(nav);
                }
                if (leftPart) {
                    observer.observe(leftPart);
                }
                if (rightPart) {
                    observer.observe(rightPart);
                }
            }

            var mutationTargets = [leftPart, rightPart];
            mutationTargets.forEach(function (target) {
                if (!target || typeof MutationObserver === 'undefined') {
                    return;
                }
                var observer = new MutationObserver(function () {
                    scheduleBreadcrumbAdjustment();
                });
                observer.observe(target, {childList: true, subtree: true, attributes: true});
            });
        } catch (err) {
            console.warn('Failed to bind breadcrumb observers', err);
        }

        {% if websocket_url %}
            getServerCommsManager().init_websocket_connection(
                "{{ websocket_url|default:"" }}"
            );
        {% endif %}
    });
</script>
