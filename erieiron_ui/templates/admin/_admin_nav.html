<div class="workflow-admin__top-nav d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
    <div class="d-flex flex-wrap gap-2">
        <a href="{% url 'view_admin_users' %}"
           class="btn {% if admin_active_tab == 'users' %}btn-primary{% else %}btn-outline-secondary{% endif %}">
            User Management
        </a>
        <a href="{% url 'view_admin_workflows' %}"
           class="btn {% if admin_active_tab == 'workflows' %}btn-primary{% else %}btn-outline-secondary{% endif %}">
            Workflow Management
        </a>
    </div>

    {% if admin_active_tab == 'workflows' %}
        <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle workflow-admin__workflow-selector"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">
                {% if selected_workflow %}
                    {{ selected_workflow.name }}
                {% else %}
                    Select Workflow
                {% endif %}
            </button>
            <ul class="dropdown-menu dropdown-menu-end workflow-admin__workflow-menu">
                {% for workflow in workflows %}
                    <li>
                        <a href="{% url 'view_admin_workflows' %}?workflow_id={{ workflow.id }}"
                           class="dropdown-item workflow-admin__workflow-menu-item {% if selected_workflow and workflow.id == selected_workflow.id %}active{% endif %}">
                            <span class="d-block fw-semibold">{{ workflow.name }}</span>
                            <span class="small {% if selected_workflow and workflow.id == selected_workflow.id %}text-white-50{% else %}text-muted{% endif %}">
                                {{ workflow.steps.all|length }} steps, {{ workflow.connections.all|length }} connections
                            </span>
                        </a>
                    </li>
                {% empty %}
                    <li>
                        <span class="dropdown-item-text text-muted">No workflows yet.</span>
                    </li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
</div>
