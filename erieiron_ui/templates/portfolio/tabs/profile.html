{% load erieiron_common_tags %}

<div class="row">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">Profile Settings</h5>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'view_portfolio_tab' 'profile' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="userEmail" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="userEmail" value="{{ user_email }}" readonly disabled>
                        <div class="form-text">Your email address cannot be changed.</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="personalizationInfo" class="form-label">Personalization Notes</label>
                        <textarea class="form-control" id="personalizationInfo" name="personalization_info" rows="8" 
                                  placeholder="Add your personalization preferences and notes here...">{{ personalization_info }}</textarea>
                        <div class="form-text">Use this space to store personal notes, preferences, or reminders.</div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'action_logout' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-box-arrow-right me-2"></i>Log Out
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
