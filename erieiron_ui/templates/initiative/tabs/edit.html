<h5>Edit Initiative</h5>
<form action="{% url 'action_update_initiative' initiative.id %}" method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" name="title" id="title" class="form-control"
               value="{{ initiative.title|default:"" }}" required>
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea name="description" id="description" class="form-control" rows="5"
                  required>{{ initiative.description|default:"" }}</textarea>
    </div>

    <div class="mb-3">
        <label for="architecture" class="form-label">Architecture</label>
        <textarea name="architecture" id="architecture" class="form-control" rows="10"
                  placeholder="Describe the technical architecture, components, and implementation approach...">{{ initiative.architecture|default:"" }}</textarea>
    </div>

    <div class="mb-3 form-check">
        <input type="checkbox" name="requires_unit_tests" id="requires_unit_tests"
               class="form-check-input" {% if initiative.requires_unit_tests %}checked{% endif %}>
        <label for="requires_unit_tests" class="form-check-label">Requires Unit Tests</label>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'view_initiative' initiative.id %}" class="btn btn-secondary ms-2">Cancel</a>
</form>
<hr class="mt-3 mb-3">
<div class="d-flex">
    <form class="me-3" method="post" action="{% url 'action_initiative_regenerate_tasks' initiative.id %}"
          style="display: inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-success"
            onclick="return confirm('Are you sure you want to delete and regenerate all the tasks for this initiative?')">
            Regenerate Tasks
        </button>
    </form>
    <form class="me-3" method="post" action="{% url 'action_dowork_initiative' initiative.id %}"
          style="display: inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">
            Do Work
        </button>
    </form>
    <form method="post" action="{% url 'action_delete_initiative' initiative.id %}"
          style="display: inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-danger"
                onclick="return confirm('Are you sure you want to delete this initiative? This action cannot be undone.')">
            Delete Initiative
        </button>
    </form>
</div>
