AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, stage, prod]
    Description: Deployment environment (dev, stage, or prod)

  ECSOptimizedAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ecs/optimized-ami/amazon-linux-2/recommended/image_id

  TrustedIpRange:
    Type: String
    Description: CIDR block allowed to access EC2 and RDS
    Default: 69.181.107.147/32

  InstanceType:
    Type: String
    Default: t4g.nano

  DBInstanceType:
    Type: String
    Default: db.t4g.micro

  DBInstanceName:
    Type: String
    Default: erieiron-db-prod

  DBEngineVersion:
    Type: String
    Default: 17.2

  AllocatedStorage:
    Type: Number
    Default: 20

  GitHubToken:
    Type: String
    Description: GitHub token stored in Secrets Manager

Description: Erie Iron env

Resources:
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName


  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildInlinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !GetAtt WebServiceRepository.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !GetAtt PipelineArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref MyRDSSecret

  WebServiceRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "erieiron-webservice-${EnvironmentName}"
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  WebServiceBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: WebServiceBuild
      Source:
        Type: GITHUB
        Location: https://github.com/jjschultz/erieiron.git
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            build:
              commands:
                - echo Building the Docker image...
                - docker build -t erieiron-webservice .
                - docker tag erieiron-webservice:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/erieiron-webservice:latest
            post_build:
              commands:
                - echo Pushing the Docker image...
                - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/erieiron-webservice:latest
                - printf '[{"name":"webservice","imageUri":"%s"}]' $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/erieiron-webservice:latest > imagedefinitions.json
          artifacts:
            files: imagedefinitions.json
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:4.0
        Type: LINUX_CONTAINER
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelineInlinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt WebServiceBuild.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                Resource: !GetAtt PipelineArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - ecs:*
                Resource:
                  - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/${AppCluster}"
                  - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/${AppCluster}/${WebServiceService}"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref MyRDSSecret

  WebServicePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub_Source
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: 1
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                Owner: jjschultz
                Repo: erieiron
                Branch: main
                OAuthToken: !Ref GitHubToken
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: CodeBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref WebServiceBuild
              RunOrder: 1
        - Name: Test
          Actions:
            - Name: ValidateSpec
              ActionTypeId:
                Category: Test
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref WebServiceBuild
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: ECS_Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: 1
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                ClusterName: !Ref AppCluster
                ServiceName: !Ref WebServiceService
                FileName: imagedefinitions.json
              RunOrder: 1

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: RDS-VPC
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: RDS-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: RDS-Public-RouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [ 0, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: RDS-Public-Subnet-1
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [ 1, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: RDS-Public-Subnet-2
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  MyDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnet group for RDS"
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: my-db-subnet-group
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  MyRDSSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-rds-secret"
      Description: RDS credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username": "masteruser"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  MyPostgresDB:
    Type: AWS::RDS::DBInstance
    DependsOn: MyRDSSecret
    Properties:
      DBInstanceClass: !Ref DBInstanceType
      Engine: postgres
      EngineVersion: !Ref DBEngineVersion
      AllocatedStorage: !Ref AllocatedStorage
      StorageType: gp3
      DBInstanceIdentifier: !Sub "erieiron-db-${EnvironmentName}"
      MasterUsername: !Sub '{{resolve:secretsmanager:${MyRDSSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${MyRDSSecret}:SecretString:password}}'
      VPCSecurityGroups:
        - !GetAtt MySecurityGroup.GroupId
      DBSubnetGroupName: !Ref MyDBSubnetGroup
      BackupRetentionPeriod: 0
      MultiAZ: false
      PubliclyAccessible: false
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub "erieiron-db-${EnvironmentName}"
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName
    DeletionPolicy: Snapshot

  MySecretRDSAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref MyRDSSecret
      TargetId: !Ref MyPostgresDB
      TargetType: AWS::RDS::DBInstance

  AppCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "AppCluster-${EnvironmentName}"
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  WebServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/webservice-${EnvironmentName}"
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  WebServiceTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  WebServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "webservice-task-${EnvironmentName}"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: 256
      Memory: 512
      ExecutionRoleArn: !GetAtt WebServiceTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: webservice
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/erieiron-webservice-${EnvironmentName}:latest"
          Essential: true
          PortMappings:
            - ContainerPort: 80
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/webservice-${EnvironmentName}"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

  WebServiceALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "webservice-alb-${EnvironmentName}"
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref MySecurityGroup
      Scheme: internet-facing
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  WebServiceTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "webservice-tg-${EnvironmentName}"
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /
      Matcher:
        HttpCode: 200-399
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  WebServiceListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebServiceTargetGroup
      LoadBalancerArn: !Ref WebServiceALB
      Port: 80
      Protocol: HTTP

  WebServiceService:
    Type: AWS::ECS::Service
    DependsOn: WebServiceListener
    Properties:
      Cluster: !Ref AppCluster
      DesiredCount: 2
      LaunchType: FARGATE
      TaskDefinition: !Ref WebServiceTaskDefinition
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
      SchedulingStrategy: REPLICA
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref MySecurityGroup
      LoadBalancers:
        - TargetGroupArn: !Ref WebServiceTargetGroup
          ContainerName: webservice
          ContainerPort: 80
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "HighCPUUtilization-${EnvironmentName}"
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref AppCluster
        - Name: ServiceName
          Value: !Ref WebServiceService
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: []
      OKActions: []
      Tags:
        - Key: Project
          Value: ErieIron
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  DBEndpoint:
    Description: RDS endpoint
    Value: !GetAtt MyPostgresDB.Endpoint.Address

  VPCId:
    Description: VPC ID
    Value: !Ref VPC

  Subnet1:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1

  Subnet2:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2

  RDSSecretArn:
    Description: ARN of the generated RDS secret
    Value: !Ref MyRDSSecret

  DBPort:
    Description: Port number used by the RDS instance
    Value: 5432

  DBInstanceId:
    Description: Identifier of the RDS instance
    Value: !Ref MyPostgresDB

  SecretName:
    Description: Name of the RDS secret in Secrets Manager
    Value: !Ref MyRDSSecret

  ECSClusterName:
    Description: Name of the ECS cluster
    Value: !Ref AppCluster

  LoadBalancerDNS:
    Description: Public DNS name of the Application Load Balancer
    Value: !GetAtt WebServiceALB.DNSName

  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "ErieIronMonthlyBudget-${EnvironmentName}"
        BudgetLimit:
          Amount: 100
          Unit: USD
        BudgetType: COST
        TimeUnit: MONTHLY
        CostFilters: {}
        TimePeriod:
          Start: !Ref "AWS::Timestamp"
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: your-alert-email@example.com